name: Run Tests
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Using a newer version avoids the deprecation warning

      - name: Run tests
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        # npx handles the "installation" and execution in one step
        run: |
          npx testsprite run --id "f8fe7358-29f8-42c1-92fc-f15189fca649" --url "https://your-ngrok-link.ngrok-free.app"
