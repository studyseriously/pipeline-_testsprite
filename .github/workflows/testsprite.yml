name: TestSprite AI Testing Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # This allows you to click "Run Workflow" in the GitHub Actions tab

env:
  # Prevents Node.js 20 deprecation warnings and forces the 2026 runner environment
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  run-ai-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Uses the current stable LTS

      - name: Execute TestSprite Run
        env:
          # Ensure this secret is set in: Settings > Secrets and variables > Actions
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        run: |
          # We use npx -y to auto-confirm the install of the TestSprite CLI
          # We use the specific scoped package name to avoid the 'executable' error
          npx -y @testsprite/cli run \
            --id "f8fe7358-29f8-42c1-92fc-f15189fca649" \
            --url "https://doctrine-amiable-movie.ngrok-free.dev/" \
            --verbose
