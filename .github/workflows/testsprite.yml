name: Run Tests
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger the test manually from GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TestSprite
        run: npm install -g testsprite

      - name: Run tests
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        # Update the command below with your specific details
        run: |
          testsprite run \
            --id "f8fe7358-29f8-42c1-92fc-f15189fca649" \
            --url "https://doctrine-amiable-movie.ngrok-free.dev" \
            --upload-docs "./api-docs.yaml"
