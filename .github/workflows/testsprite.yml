name: Run Tests
on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger TestSprite via API
        run: |
          curl -X POST "https://api.testsprite.com/v1/run" \
            -H "Authorization: Bearer ${{ secrets.TESTSPRITE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "suite_id": "f8fe7358-29f8-42c1-92fc-f15189fca649",
              "url": "https://doctrine-amiable-movie.ngrok-free.dev/"
            }'
